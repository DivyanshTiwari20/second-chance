    <path d="M 120 135 C 135 125 155 120 160 105" fill="none" stroke="#D97706" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M 120 165 C 105 155 85 150 80 135" fill="none" stroke="#D97706" stroke-width="4.5" stroke-linecap="round"/>
    
